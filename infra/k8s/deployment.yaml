---
apiVersion: v1
kind: Secret
metadata:
  name: beautiful-rajesh-d234d024ad-bst-token
  namespace: scaler-keda
  labels:
    app: beautiful-rajesh-d234d024ad
    managed-by: backstract
  annotations:
    backstract.io/token-scope: "storage.*,cache.*"
type: Opaque
stringData:
  token: "PLACEHOLDER_BST_TOKEN_REPLACE_AT_RUNTIME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beautiful-rajesh-d234d024ad-depl
  namespace: scaler-keda
  labels:
    app: beautiful-rajesh-d234d024ad
    release: prometheus # Added label for PodMonitor discovery
spec:
  replicas: 0
  selector:
    matchLabels:
      app: beautiful-rajesh-d234d024ad
      release: prometheus # Added label for PodMonitor discovery
  template:
    metadata:
      labels:
        app: beautiful-rajesh-d234d024ad
        release: prometheus # Added label for PodMonitor discovery
    spec:
      serviceAccountName: alloy-service-account
      volumes:
      - name: alloy-config
        configMap:
          name: alloy-configmap
          items:
          - key: alloy.river
            path: config.alloy

      - name: podinfo
        downwardAPI:
          items:
          - path: "labels"
            fieldRef:
              fieldPath: metadata.labels
          - path: "annotations"
            fieldRef:
              fieldPath: metadata.annotations
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "user"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nodepool
                    operator: In
                    values: ["spot-users"]
      containers:
      - name: beautiful-rajesh-d234d024ad
        image: 216084506783.dkr.ecr.ap-south-1.amazonaws.com/backstract_apps:beautiful-rajesh-d234d024ad
        imagePullPolicy: Always
        env:
        - name: BACKSTRACT_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: beautiful-rajesh-d234d024ad-bst-token
              key: token
        - name: BACKSTRACT_PLATFORM_URL
          value: "https://api-release.beemerbenzbentley.site/sigma"
        envFrom:
        - configMapRef:
            name: env-configmap-coll-3c7d4514aab14347899c7e86a17f1441-deployment-ef818b12-d61f-434a-b73a-675f1d3a44fb
        ports:
        - containerPort: 7070
          name: http # Optional for HTTP traffic
        - containerPort: 7070 #same as the deployed code
          name: metrics # Added port for metrics scraping
        resources:
          requests:
            memory: "210Mi"
            cpu: "200m"
          limits:
            memory: "500Mi"
            cpu: "500m"

      - name: alloy-sidecar
        image: grafana/alloy:latest
        args:
        - "run"
        - "/etc/alloy/config.alloy"
        - "--server.http.listen-addr=0.0.0.0:12345"
        ports:
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: otlp-http
          containerPort: 4318
          protocol: TCP
        - name: alloy-http
          containerPort: 12345
          protocol: TCP
        volumeMounts:
        - name: alloy-config
          mountPath: /etc/alloy
        - name: podinfo
          mountPath: /etc/podinfo
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "300m"
